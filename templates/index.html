<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generator by deathsweep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background-color: #1e1e1e;
        }
    </style>
</head>
<body class="text-zinc-200 min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-6xl mx-auto">
        
        <!-- Header -->
        <div class="flex items-center gap-4 mb-8">
            <div class="w-16 h-16 bg-[#0088cc] rounded-2xl flex flex-col items-center justify-center text-white shadow-lg p-2.5">
                <div class="grid grid-cols-2 gap-1 w-full h-full">
                    <div class="border-2 border-white rounded-md"></div>
                    <div class="border-2 border-white rounded-md"></div>
                    <div class="border-2 border-white rounded-md"></div>
                    <div class="border-2 border-white rounded-md flex items-center justify-center text-[8px] font-bold">m.</div>
                </div>
            </div>
            <div>
                <div class="flex items-baseline gap-2">
                    <h1 class="text-3xl font-bold tracking-tight text-white">QR Generator</h1>
                    <span class="text-zinc-400 text-xs font-normal">by deathsweep.</span>
                </div>
                <p class="text-zinc-400 text-xs italic mt-1">Generate quick and easy QR codes</p>
            </div>
        </div>

        <!-- Main Panels Container -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Left Panel: Form -->
            <div class="bg-[#2d2d2d] rounded-3xl p-8 flex flex-col justify-between shadow-xl">
                <div>
                    <h2 class="text-2xl font-semibold mb-6 text-white">Let’s Start! :)</h2>
                    
                    <div class="space-y-5">
                        <!-- Destination URL -->
                        <div>
                            <label class="block text-xs font-medium text-zinc-300 mb-2">Destination URL</label>
                            <input id="url-input" 
                                   type="text" 
                                   placeholder=""
                                   class="w-full bg-[#404040] text-white border-none rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                        </div>

                        <!-- Upload Image -->
                        <div>
                            <label class="block text-xs font-medium text-zinc-300 mb-2">Upload Image</label>
                            <div id="upload-area" 
                                 class="bg-[#404040] border border-dashed border-zinc-500 hover:border-zinc-300 rounded-xl h-36 flex flex-col items-center justify-center cursor-pointer transition-colors relative overflow-hidden">
                                <div id="upload-placeholder" class="text-center p-4">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 mx-auto mb-2 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v-4m0 0l4 4m-4-4l4-4m12 4v4m0 0l-4-4m4 4l-4 4" />
                                    </svg>
                                    <p class="text-zinc-300 text-xs font-medium">Click to upload or drag & drop</p>
                                    <p class="text-[10px] text-zinc-400 mt-1">PNG, JPG, WEBP (max 5MB)</p>
                                </div>
                                <input id="image-upload" type="file" accept="image/*" class="hidden">
                                <img id="preview-logo" class="hidden max-h-28 rounded-lg object-contain">
                            </div>
                        </div>

                        <!-- Colors -->
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <div class="bg-[#404040] rounded-xl px-4 py-2.5 flex items-center justify-between cursor-pointer relative">
                                    <span class="text-xs text-zinc-300 font-medium">Fill Color</span>
                                    <input id="fill-color" type="color" value="#1667A6" class="w-6 h-6 rounded border-none bg-transparent cursor-pointer">
                                </div>
                                <input id="fill-hex" type="hidden" value="#1667A6">
                            </div>
                            <div>
                                <div class="bg-[#404040] rounded-xl px-4 py-2.5 flex items-center justify-between cursor-pointer relative">
                                    <span class="text-xs text-zinc-300 font-medium">Background Colour</span>
                                    <input id="bg-color" type="color" value="#ffffff" class="w-6 h-6 rounded border-none bg-transparent cursor-pointer">
                                </div>
                                <input id="bg-hex" type="hidden" value="#ffffff">
                            </div>
                        </div>

                        <!-- Checkbox -->
                        <div class="flex items-center justify-center gap-2 pt-2">
                            <input id="bg-fill" type="checkbox" class="w-4 h-4 accent-zinc-500 bg-zinc-700 border-none rounded">
                            <label for="bg-fill" class="text-xs text-zinc-300 cursor-pointer">Image Background Fill</label>
                        </div>
                    </div>
                </div>

                <!-- Generate Button -->
                <button onclick="generateQR()" 
                        class="w-full bg-[#404040] hover:bg-[#4a4a4a] active:bg-[#383838] transition-colors text-white font-semibold py-3.5 rounded-xl text-sm shadow-md mt-6">
                    Generate QR
                </button>
            </div>

            <!-- Right Panel: Live Preview -->
            <div class="bg-[#2d2d2d] rounded-3xl p-8 flex flex-col justify-between shadow-xl">
                <div>
                    <h2 class="text-2xl font-semibold mb-6 text-white">Live Preview</h2>
                    
                    <div id="preview-area" 
                         class="bg-[#404040] rounded-2xl h-80 flex items-center justify-center relative overflow-hidden">
                        
                        <div id="qr-preview" class="hidden text-center p-4">
                            <img id="qr-image" class="max-h-64 mx-auto rounded-xl shadow-lg object-contain" alt="QR Code Preview">
                        </div>
                        
                        <div id="empty-preview" class="text-center text-zinc-500">
                            <p class="text-sm">Your QR code will appear here</p>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="downloadQR()" 
                            id="download-btn"
                            class="w-full bg-[#404040] hover:bg-[#4a4a4a] transition-colors text-white font-semibold py-3.5 rounded-xl text-sm opacity-50 cursor-not-allowed" disabled>
                        Download PNG
                    </button>
                    <button onclick="resetForm()" 
                            class="w-full bg-[#404040] hover:bg-[#4a4a4a] transition-colors text-white font-semibold py-3.5 rounded-xl text-sm">
                        Generate New
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        let currentQRUrl = null;
        let logoBase64 = null;

        // Sync inputs
        const fillColor = document.getElementById('fill-color');
        const fillHex = document.getElementById('fill-hex');
        const bgColor = document.getElementById('bg-color');
        const bgHex = document.getElementById('bg-hex');

        fillColor.addEventListener('input', () => fillHex.value = fillColor.value.toUpperCase());
        bgColor.addEventListener('input', () => bgHex.value = bgColor.value.toUpperCase());

        // Image Upload
        const uploadArea = document.getElementById('upload-area');
        const imageUpload = document.getElementById('image-upload');
        const previewLogo = document.getElementById('preview-logo');
        const uploadPlaceholder = document.getElementById('upload-placeholder');

        uploadArea.addEventListener('click', () => imageUpload.click());

        imageUpload.addEventListener('change', (e) => {
            if (e.target.files[0]) handleImage(e.target.files[0]);
        });

        // Drag & Drop
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('border-white'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('border-white'));
        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.classList.remove('border-white');
            if (e.dataTransfer.files[0]) handleImage(e.dataTransfer.files[0]);
        });

        function handleImage(file) {
            if (file.size > 5 * 1024 * 1024) {
                alert("Image is too large. Maximum size is 5MB.");
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                logoBase64 = e.target.result;
                previewLogo.src = logoBase64;
                previewLogo.classList.remove('hidden');
                uploadPlaceholder.classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        async function generateQR() {
            const url = document.getElementById('url-input').value.trim();
            if (!url) return alert("Please enter a Destination URL");

            const payload = {
                link: url,
                image: logoBase64 || null,
                fill_color: fillColor.value,
                bg_color: bgColor.value,
                bg_fill: document.getElementById('bg-fill').checked
            };

            try {
                const res = await fetch('/generate_qr', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const err = await res.json();
                    return alert(err.message || "Failed to generate QR");
                }

                const blob = await res.blob();
                const imageUrl = URL.createObjectURL(blob);

                document.getElementById('qr-image').src = imageUrl;
                document.getElementById('qr-preview').classList.remove('hidden');
                document.getElementById('empty-preview').classList.add('hidden');
                
                const downloadBtn = document.getElementById('download-btn');
                downloadBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                downloadBtn.removeAttribute('disabled');

                currentQRUrl = imageUrl;

            } catch (err) {
                console.error(err);
                alert("Something went wrong. Please try again.");
            }
        }

        function downloadQR() {
            if (!currentQRUrl) return;
            const a = document.createElement('a');
            a.href = currentQRUrl;
            a.download = 'qr_with_logo.png';
            a.click();
        }

        function resetForm() {
            document.getElementById('url-input').value = '';
            logoBase64 = null;
            previewLogo.classList.add('hidden');
            uploadPlaceholder.classList.remove('hidden');
            document.getElementById('qr-preview').classList.add('hidden');
            document.getElementById('empty-preview').classList.remove('hidden');
            
            const downloadBtn = document.getElementById('download-btn');
            downloadBtn.classList.add('opacity-50', 'cursor-not-allowed');
            downloadBtn.setAttribute('disabled', 'true');
            currentQRUrl = null;
        }
    </script>
</body>
</html>
