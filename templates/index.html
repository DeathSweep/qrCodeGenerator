<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo QR Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto py-12 px-6">
        <!-- Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-3 mb-4">
                <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center text-white text-3xl shadow-lg">
                    <i class="fa-solid fa-qrcode"></i>
                </div>
                <h1 class="title-font text-5xl font-semibold tracking-tight text-gray-900">QRify</h1>
            </div>
            <p class="text-xl text-gray-600">Generate beautiful QR codes with your custom logo</p>
        </div>

        <div class="grid md:grid-cols-2 gap-10">
            <!-- Input Panel -->
            <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
                <h2 class="text-2xl font-semibold text-gray-800 mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-wand-magic-sparkles text-indigo-500"></i>
                    Create Your QR
                </h2>
                
                <div class="space-y-8">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Destination URL</label>
                        <input 
                            type="text" 
                            id="link" 
                            value="https://example.com"
                            placeholder="https://yourwebsite.com"
                            class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:border-indigo-500 text-lg"
                        >
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Upload Logo</label>
                        <div class="border-2 border-dashed border-gray-300 rounded-3xl p-8 hover:border-indigo-400 transition-colors">
                            <div class="flex flex-col items-center justify-center text-center">
                                <div id="preview" class="hidden w-24 h-24 mx-auto mb-4 rounded-2xl overflow-hidden border border-gray-200">
                                    <img id="logo-preview" class="w-full h-full object-contain" alt="Logo preview">
                                </div>
                                
                                <input type="file" id="imageInput" accept="image/*" class="hidden">
                                <button 
                                    onclick="document.getElementById('imageInput').click()"
                                    class="px-6 py-3 bg-white border border-gray-300 hover:border-indigo-300 rounded-2xl text-sm font-medium text-gray-700 hover:text-indigo-600 flex items-center gap-2">
                                    <i class="fa-solid fa-upload"></i>
                                    Choose Logo Image
                                </button>
                                <p class="text-xs text-gray-500 mt-4">PNG, JPG, WebP • Recommended square logo</p>
                            </div>
                        </div>
                    </div>

                    <button 
                        onclick="generateQR()"
                        id="generateBtn"
                        class="w-full gradient-bg text-white py-5 rounded-3xl font-semibold text-lg flex items-center justify-center gap-3 hover:shadow-xl transition-all active:scale-[0.97]">
                        <i class="fa-solid fa-bolt"></i>
                        GENERATE QR CODE
                    </button>
                </div>
            </div>

            <!-- Result Panel -->
            <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100 flex flex-col">
                <h2 class="text-2xl font-semibold text-gray-800 mb-6">Preview</h2>
                
                <div id="result" class="flex-1 flex items-center justify-center min-h-[380px] bg-gray-50 rounded-3xl border border-dashed border-gray-200 relative">
                    <div id="empty-state" class="text-center">
                        <div class="w-20 h-20 mx-auto mb-4 bg-white rounded-2xl shadow flex items-center justify-center text-4xl">📱</div>
                        <p class="text-gray-400 font-medium">Your QR code will appear here</p>
                    </div>

                    <div id="qr-result" class="hidden flex-col items-center w-full">
                        <div class="bg-white p-6 rounded-3xl shadow-inner">
                            <img id="qr-image" class="max-w-[300px] rounded-2xl" alt="Generated QR Code">
                        </div>
                        
                        <div class="mt-8 flex gap-4 w-full">
                            <button 
                                onclick="downloadQR()"
                                class="flex-1 px-8 py-4 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl font-semibold flex items-center justify-center gap-2">
                                <i class="fa-solid fa-download"></i>
                                Download PNG
                            </button>
                            <button 
                                onclick="resetForm()"
                                class="flex-1 px-8 py-4 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-2xl font-semibold">
                                New QR
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentQRUrl = null;

        // Logo preview
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('logo-preview').src = ev.target.result;
                    document.getElementById('preview').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        async function generateQR() {
            const link = document.getElementById('link').value.trim();
            const fileInput = document.getElementById('imageInput');
            const file = fileInput.files[0];
            const generateBtn = document.getElementById('generateBtn');

            if (!link) {
                alert("Please enter a valid URL");
                return;
            }
            if (!file) {
                alert("Please upload a logo image");
                return;
            }

            generateBtn.disabled = true;
            generateBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                Generating...
            `;

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const response = await fetch('/generate_qr', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            link: link, 
                            image: e.target.result 
                        })
                    });

                    if (response.ok) {
                        const blob = await response.blob();
                        const url = URL.createObjectURL(blob);
                        
                        currentQRUrl = url;
                        
                        document.getElementById('empty-state').classList.add('hidden');
                        document.getElementById('qr-result').classList.remove('hidden');
                        document.getElementById('qr-image').src = url;
                    } else {
                        const errorData = await response.json().catch(() => ({}));
                        alert(errorData.message || "Failed to generate QR Code");
                    }
                } catch (error) {
                    console.error(error);
                    alert("Error connecting to server. Please try again.");
                } finally {
                    generateBtn.disabled = false;
                    generateBtn.innerHTML = `<i class="fa-solid fa-bolt"></i> GENERATE QR CODE`;
                }
            };

            reader.readAsDataURL(file);
        }

        function downloadQR() {
            if (!currentQRUrl) return;
            const a = document.createElement('a');
            a.href = currentQRUrl;
            a.download = 'qr_with_logo.png';
            a.click();
        }

        function resetForm() {
            document.getElementById('qr-result').classList.add('hidden');
            document.getElementById('empty-state').classList.remove('hidden');
            currentQRUrl = null;
        }

        // Enter key support
        document.getElementById('link').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateQR();
        });
    </script>
</body>
</html>
